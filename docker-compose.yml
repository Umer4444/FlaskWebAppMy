services:
  flask-app-1:
    image: umer4444/my-app:${APP1_IMAGE_TAG}
    ports:
      - "8001:8000"
    restart: always
    environment:
      - INSTANCE_NAME=flask-app-1
      - APP_VERSION=2.0

  flask-app-2:
    image: umer4444/my-app:${APP2_IMAGE_TAG}
    ports:
      - "8002:8000"
    restart: always
    environment:
      - INSTANCE_NAME=flask-app-2
      - APP_VERSION=1.0